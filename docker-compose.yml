version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: message_calc_db
    environment:
      POSTGRES_DB: message_calc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: message_calc_api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/message_calc?sslmode=disable
      JWT_SECRET: super-secret-key-change-me
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
